<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Fragmento 3 - Aurora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/frag3.css') }}">
    <script defersrc="{{ url_for('static', filename='js/frag3.js') }}"></script>
</head>

<body>
    <div class="container">
        <h1>Fragmento 3 - A Voz Perdida</h1>
        <p>Enquanto caminha pela estação vazia, Aurora ouve uma gravação antiga... uma voz familiar, mas distante.</p>

        <!-- Áudio -->
        <audio id="audio-fragmento" autoplay>
            <source src="{{ url_for('static', filename='audio/voz_aurora.mp3') }}" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>

        <div class="controles">
            <button id="playBtn">▶ Play</button>
            <button id="pauseBtn">⏸ Pause</button>
            <button id="restartBtn">🔄 Reiniciar</button>
        </div>

        <!-- Botão oculto -->
        <a id="proximoBtn" class="btn" href="{{ url_for('fragmento4') }}" style="display: none;">Continuar</a>
    </div>
</body>

</html>
